name: Build

on:
  push:
    branches: [ "*" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    name: Build&Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Setup JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 11
        cache: gradle
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    - name: Build
      run: ./gradlew build
    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: build/outputs/apk/release
        signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"
    - name: Get Short SHA
      id: short
      run: |
        echo "sha7=$(echo ${{github.sha}} | cut -c1-7)"
        echo "sha7=$(echo ${{github.sha}} | cut -c1-7)" >> $GITHUB_OUTPUT
    - name: Upload Release
      uses: actions/upload-artifact@v4
      with:
        name: NevolutionXposed_${{github.ref_name}}_${{steps.short.output.sha7}}.apk
        path: ${{steps.sign_app.outputs.signedReleaseFile}}
    - name: Prepare Release
      run: mv ${{steps.sign_app.outputs.signedReleaseFile}} NevolutionXposed_${{github.ref_name}}.apk
    - name: Release APK
      if: startsWith(github.ref, 'refs/tags/v')
      uses: ncipollo/release-action@v1
      with:
        artifacts: "NevolutionXposed_${{github.ref_name}}.apk"
        token: ${{ github.token }}
        allowUpdates: true
